<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index - Simple Calculator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Index - Simple Calculator</h1>
        <p class="trainer-info">Trainer Name: Pankaj Patil</p>

        <div class="form-group">
            <label for="firstNumber">First Number (Integer)</label>
            <input type="number" id="firstNumber" placeholder="Enter first number" value="45">
        </div>

        <div class="form-group">
            <label for="secondNumber">Second Number (Integer)</label>
            <input type="number" id="secondNumber" placeholder="Enter second number" value="12">
        </div>

        <div class="button-grid">
            <button class="btn-add" onclick="calculate('add')">Add</button>
            <button class="btn-sub" onclick="calculate('subtract')">Subtract</button>
            <button class="btn-mul" onclick="calculate('multiply')">Multiply</button>
            <button class="btn-div" onclick="calculate('divide')">Division</button>
        </div>

        <div class="result-container">
            <p class="result-label">Calculated Result</p>
            <div id="result" class="result-display">45 ÷ 12 = 3.75</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
